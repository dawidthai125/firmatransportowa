# Deploy Supabase Edge Function (osobny projekt — NIE wgdom)

name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
      - 'src/**'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-transflow
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: 2.101.0

      - name: Deploy transflow-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Brak SUPABASE_ACCESS_TOKEN w GitHub Secrets"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::Brak SUPABASE_PROJECT_REF w GitHub Secrets (ID nowego projektu)"
            exit 1
          fi
          supabase functions deploy transflow-api --project-ref "$SUPABASE_PROJECT_REF" --use-api
