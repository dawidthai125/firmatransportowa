<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1222" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="Tajski-Trans — panel pracowniczy firmy transportowej. Flota, kursy, raporty kierowców i awarie w jednym miejscu."
    />
    <title>Tajski-Trans — Panel pracowniczy · transport TSL</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <style>
      html, body { height: 100%; height: 100dvh; margin: 0; overflow: hidden; }
      /* Portal / logowanie: przewijanie w #root; panele: .scroll-area w app-shell */
      #root {
        height: 100%;
        height: 100dvh;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior-y: contain;
        -webkit-overflow-scrolling: touch;
      }
      button, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
      @media (max-width: 767px) {
        input:not([type="checkbox"]):not([type="radio"]):not([type="range"]),
        select,
        textarea { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
